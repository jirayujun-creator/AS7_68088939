<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แบบฟอร์มลงทะเบียน - Updated Positions</title>
    <style>
        /* สไตล์พื้นหลังและการขยับ */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Tahoma', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?ixlib=rb-4.0.3&auto=format&fit=crop&w=2500&q=80');
            background-size: 150% auto;
            animation: moveBackground 40s linear infinite;
            /* เริ่มต้นให้ทำงาน (running) หรือจะตั้งเป็น paused ก็ได้ */
            animation-play-state: running; 
        }

        @keyframes moveBackground {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* ฟอร์มลงทะเบียน */
        .registration-card {
            background-color: rgba(255, 255, 255, 0.85);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 450px;
            backdrop-filter: blur(5px);
            margin-bottom: 20px;
        }

        h2 { text-align: center; margin-bottom: 20px; color: #333; }
        .form-group { margin-bottom: 12px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        
        input[type="text"], input[type="email"], input[type="password"], select {
            width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 14px;
        }

        .radio-group { display: flex; gap: 15px; align-items: center; padding: 5px 0; }
        .button-group { display: flex; justify-content: center; gap: 10px; margin-top: 20px; }
        
        .btn { padding: 10px 25px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; color: white; transition: 0.2s; }
        .btn-submit { background-color: #007bff; }
        .btn-reset { background-color: #dc3545; }
        .btn:hover { opacity: 0.9; }

        /* ปุ่มควบคุม Play/Stop */
        .controls { display: flex; gap: 10px; }
        .control-btn { padding: 8px 25px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-play { background-color: #ffc107; color: #000; }
        .btn-stop { background-color: #333; color: #fff; }
        .control-btn:hover { transform: scale(1.05); }
    </style>
</head>
<body id="bg-body">

    <div class="registration-card">
        <h2>แบบฟอร์มลงทะเบียน</h2>
        <form>
            <div class="form-group">
                <label>ชื่อ-นามสกุล:</label>
                <input type="text" placeholder="กรุณากรอกชื่อ-นามสกุล">
            </div>
            <div class="form-group">
                <label>อีเมล:</label>
                <input type="email" placeholder="example@domain.com">
            </div>
            <div class="form-group">
                <label>รหัสผ่าน:</label>
                <input type="password" placeholder="ระบุรหัสผ่าน">
            </div>
            <div class="form-group">
                <label>เพศ:</label>
                <div class="radio-group">
                    <label style="font-weight:normal"><input type="radio" name="gender"> ชาย</label>
                    <label style="font-weight:normal"><input type="radio" name="gender"> หญิง</label>
                </div>
            </div>
            <div class="form-group">
                <label>ตำแหน่ง:</label>
                <select id="position">
                    <option value="" disabled selected>เลือกตำแหน่งของคุณ</option>
                    <option value="manager">Manager</option>
                    <option value="developer">Developer</option>
                    <option value="designer">Designer</option>
                    <option value="marketing">Marketing</option>
                </select>
            </div>
            <div class="button-group">
                <button type="button" class="btn btn-submit">ลงทะเบียน</button>
                <button type="reset" class="btn btn-reset">ล้างข้อมูล</button>
            </div>
        </form>
    </div>

    <div class="controls">
        <button class="control-btn btn-play" onclick="setAnimationState('running')">Play</button>
        <button class="control-btn btn-stop" onclick="setAnimationState('paused')">Stop</button>
    </div>

    <script>
        function setAnimationState(state) {
            document.getElementById('bg-body').style.animationPlayState = state;
        }
    </script>

</body>
</html>
